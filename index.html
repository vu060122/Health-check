<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 背景漸層：清新的藍綠色調 (Teal) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" /> <!-- 淺藍綠 -->
      <stop offset="100%" stop-color="#0f766e" /> <!-- 深藍綠 -->
    </linearGradient>
    
    <!-- 圖示陰影增加立體層次感 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#042f2e" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 滿版正方形背景 (iOS 會自動幫我們裁切圓角) -->
  <rect width="1024" height="1024" fill="url(#bg)" />

  <!-- 中央主圖示群組 -->
  <g filter="url(#shadow)">
    <!-- 病歷夾/報告紙張底板 -->
    <rect x="262" y="180" width="500" height="664" rx="56" fill="#ffffff" />
    
    <!-- 病歷夾頂部金屬夾/裝飾 -->
    <rect x="412" y="140" width="200" height="80" rx="32" fill="#99f6e4" />

    <!-- 報告上的文字紀錄線條 -->
    <line x1="362" y1="360" x2="662" y2="360" stroke="#ccfbf1" stroke-width="32" stroke-linecap="round"/>
    <line x1="362" y1="460" x2="542" y2="460" stroke="#ccfbf1" stroke-width="32" stroke-linecap="round"/>

    <!-- 醫療追蹤徽章 -->
    <circle cx="512" cy="670" r="180" fill="#0d9488" />
    
    <!-- 心電圖/健康活動波浪線 -->
    <path 
      d="M 370 670 L 440 670 L 485 550 L 535 790 L 585 670 L 654 670" 
      fill="none" 
      stroke="#ffffff" 
      stroke-width="36" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>
</svg>
